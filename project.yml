name: FetchDish
options:
  bundleIdPrefix: com.fetchdish
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  FetchDish:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: FetchDish
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.fetchdish.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: FetchDish
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VPM9NGP3JW
        ENABLE_PREVIEWS: true
        CODE_SIGN_ENTITLEMENTS: FetchDish/FetchDish.entitlements
    dependencies:
      - package: SwiftSoup
      - target: FetchDishShareExtension
        embed: true
        codeSign: true
        destinationFilters: [iOS]

  FetchDishShareExtension:
    type: app-extension
    supportedDestinations: [iOS]
    sources:
      - path: FetchDishShareExtension
      - path: FetchDish/Models/Recipe.swift
      - path: FetchDish/Models/ShoppingListItem.swift
      - path: FetchDish/Services/RecipeParser.swift
      - path: FetchDish/Services/IngredientParser.swift
      - path: FetchDish/Services/SharedModelContainer.swift
      - path: FetchDish/Models/FavoriteIngredient.swift
      - path: FetchDish/Models/UserAllergen.swift
      - path: FetchDish/Models/UserDietaryPreference.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fetchdish.app.ShareExtension
        INFOPLIST_FILE: FetchDishShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: VPM9NGP3JW
        CODE_SIGN_ENTITLEMENTS: FetchDishShareExtension/FetchDishShareExtension.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: SwiftSoup
